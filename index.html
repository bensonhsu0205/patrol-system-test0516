<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<meta name="theme-color" content="#f97316">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="社區巡邏">
<title>社區巡邏系統</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;600;700;800&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<style>
:root{--bg:#0f1219;--sur:#1a2030;--card:#1e2535;--bdr:#2d3748;--pri:#f97316;--ok:#22c55e;--warn:#fbbf24;--err:#ef4444;--txt:#f9fafb;--dim:#6b7280;--acc:#38bdf8}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Noto Sans TC',-apple-system,sans-serif;background:var(--bg);color:var(--txt);min-height:100vh;overflow-x:hidden;-webkit-text-size-adjust:100%;font-size:18px}
button{font-family:inherit;cursor:pointer}
input,textarea,select{font-family:inherit;font-size:18px;-webkit-text-size-adjust:100%}
.topbar{background:var(--pri);padding:14px 18px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:200}
.topbar-l{font-size:19px;color:#fff;font-weight:800;flex:1;margin-right:10px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.topbar-r{text-align:right;flex-shrink:0}
.card{background:var(--sur);border:1px solid var(--bdr);border-radius:14px;padding:18px;margin-bottom:14px}
.input{background:var(--bg);border:1px solid var(--bdr);border-radius:10px;color:var(--txt);padding:14px 15px;font-size:18px;width:100%}
.input:focus{outline:none;border-color:var(--pri)}
.btn-pri{background:var(--pri);color:#fff;border:none;border-radius:12px;padding:17px;font-size:19px;font-weight:700;width:100%;cursor:pointer}
.btn-ghost{background:transparent;color:var(--dim);border:1px solid var(--bdr);border-radius:12px;padding:16px;font-size:18px;width:100%;cursor:pointer}
.content{padding:12px 14px 120px;max-width:480px;margin:0 auto;width:100%}
.content2{padding:20px 16px 130px;max-width:480px;margin:0 auto;width:100%}
.bottom-bar{position:fixed;bottom:0;left:0;right:0;background:var(--sur);border-top:1px solid var(--bdr);padding:14px 16px;z-index:100}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.6);display:flex;align-items:flex-end;justify-content:center;z-index:400}
.modal-center{position:fixed;inset:0;background:rgba(0,0,0,.6);display:flex;align-items:center;justify-content:center;padding:20px;z-index:500}
.modal-box{background:var(--sur);border:1px solid var(--bdr);border-radius:18px;padding:28px;width:100%;max-width:360px}
.modal-sheet{background:var(--sur);border:1px solid var(--bdr);border-radius:20px 20px 0 0;padding:24px;width:100%;max-width:480px}
.toast{position:fixed;top:90px;left:50%;transform:translateX(-50%);background:#1f2937;border:1px solid var(--bdr);border-radius:14px;padding:14px 24px;font-size:16px;color:var(--txt);box-shadow:0 6px 24px rgba(0,0,0,.5);z-index:700;max-width:88vw;text-align:center;pointer-events:none;animation:fi .2s ease}
@keyframes fi{from{opacity:0;transform:translateX(-50%) translateY(-10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
@keyframes spin{to{transform:rotate(360deg)}}
.blink{animation:blink 1.2s infinite}
.spinner{width:44px;height:44px;border:3px solid var(--bdr);border-top-color:var(--pri);border-radius:50%;animation:spin .8s linear infinite}
.loading{display:flex;align-items:center;justify-content:center;min-height:100vh;flex-direction:column;gap:16px;color:var(--dim);font-size:18px}
.shift-btn{flex:1;padding:22px 8px;border-radius:16px;border:2.5px solid var(--bdr);background:var(--sur);color:var(--dim);cursor:pointer;text-align:center;transition:all .2s}
.pill{padding:10px 20px;border-radius:22px;border:2.5px solid var(--bdr);background:transparent;color:var(--dim);font-size:17px;font-weight:700;cursor:pointer;white-space:nowrap;flex-shrink:0;transition:all .2s}
.pill.on{border-color:var(--pri);background:rgba(249,115,22,.15);color:var(--pri)}
.ftab{padding:8px 16px;border-radius:20px;border:1px solid var(--bdr);background:transparent;color:var(--dim);font-size:15px;cursor:pointer;transition:all .2s}
.ftab.on{border-color:var(--pri);background:rgba(249,115,22,.15);color:var(--pri)}
.ztab{padding:7px 14px;border-radius:20px;border:1.5px solid var(--bdr);background:transparent;color:var(--dim);font-size:14px;cursor:pointer;white-space:nowrap;flex-shrink:0;transition:all .2s}
.ztab.zon{font-weight:700;}
.tc{border-radius:14px;margin-bottom:12px;overflow:hidden;border:2px solid}
.tc.done{background:#052e16;border-color:var(--ok)}
.tc.overdue{background:#2d0a0a;border-color:var(--err)}
.tc.due{background:#1c1505;border-color:var(--warn)}
.tc.upcoming{background:var(--card);border-color:var(--bdr)}
.zone-tag{font-size:14px;padding:4px 10px;border-radius:10px;font-weight:600;display:inline-block}
.chk{width:44px;height:44px;border-radius:50%;border:3px solid;display:flex;align-items:center;justify-content:center;font-size:19px;font-weight:700;flex-shrink:0;transition:all .2s}
.prog-bg{background:var(--bg);border-radius:4px;height:8px;overflow:hidden}
.prog-fill{height:100%;border-radius:4px;transition:width .5s}
.sync-dot{width:9px;height:9px;border-radius:50%;display:inline-block;vertical-align:middle;margin-right:3px}
</style>
</head>
<body>
<div id="app"><div class="loading"><div class="spinner"></div><div>連線 Firebase 中...</div></div></div>
<script>
// ─── Firebase ────────────────────────────────────────────────────────────────
const firebaseConfig={apiKey:"AIzaSyBuZ65GlE9IOdO1VoGxSXhEbMZhy4tNUK4",authDomain:"patrol-system-ab0dc.firebaseapp.com",projectId:"patrol-system-ab0dc",storageBucket:"patrol-system-ab0dc.firebasestorage.app",messagingSenderId:"354364541590",appId:"1:354364541590:web:831c3aeec85da08e0f90b7"};
firebase.initializeApp(firebaseConfig);
const db=firebase.firestore();

// ─── Constants ────────────────────────────────────────────────────────────────
let PIN=localStorage.getItem('adminPin')||'1234';
const ZC={'外哨':'#fb923c','三期':'#60a5fa','四期':'#a78bfa','外圍':'#34d399','電錶':'#f87171','其他':'#9ca3af'};
const TI={'開啟':'💡','關閉':'🔌','抄表':'📸','巡查':'👁️'};
const SC={early:'#fb923c',late:'#8b5cf6'};
const SL={early:'早班 07:00–19:00',late:'晚班 19:00–07:00'};

const DEFTASKS=[
{id:'1',time:'06:10',zone:'外圍',task:'外圍及中庭壁燈、高柱燈是否關閉',type:'關閉',shifts:['early','late']},
{id:'2',time:'06:20',zone:'三期',task:'三期各棟電視是否開啟',type:'開啟',shifts:['early','late']},
{id:'3',time:'06:20',zone:'四期',task:'四期各棟電視是否開啟',type:'開啟',shifts:['early','late']},
{id:'4',time:'07:00',zone:'外哨',task:'外哨柵欄燈條是否關閉',type:'關閉',shifts:['early','late']},
{id:'5',time:'18:00',zone:'外哨',task:'外哨柵欄燈條是否開啟',type:'開啟',shifts:['early']},
{id:'6',time:'18:10',zone:'三期',task:'三期外圍及中庭所有燈光是否開啟',type:'開啟',shifts:['early']},
{id:'7',time:'18:10',zone:'四期',task:'四期外圍及中庭所有燈光是否開啟',type:'開啟',shifts:['early']},
{id:'8',time:'21:20',zone:'四期',task:'四期公設（含燈光、冷氣、機台電源），除健身房，是否關閉',type:'關閉',shifts:['late']},
{id:'9',time:'21:30',zone:'三期',task:'三期公設（含燈光、冷氣、機台電源）是否關閉',type:'關閉',shifts:['late']},
{id:'10',time:'22:05',zone:'外圍',task:'外圍及中庭燈光（除壁燈、高柱燈）是否確認關閉',type:'關閉',shifts:['late']},
{id:'11',time:'23:00',zone:'三期',task:'三期大廳部分燈光是否關閉，各棟電視是否關閉',type:'關閉',shifts:['late']},
{id:'12',time:'23:00',zone:'四期',task:'四期大廳部分燈光是否關閉，各棟電視是否關閉',type:'關閉',shifts:['late']},
{id:'13',time:'00:10',zone:'四期',task:'四期健身房（燈光、冷氣、機台電源）是否關閉',type:'關閉',shifts:['late']},
{id:'14',time:'02:00',zone:'電錶',task:'電錶是否拍照抄表',type:'抄表',shifts:['late']},
];

// ─── State ────────────────────────────────────────────────────────────────────
const S={
screen:'login',
community:localStorage.getItem('com')||'心之所向社區',
shift:null,officers:[''],curIdx:0,
sessionId:null,
tasks:JSON.parse(localStorage.getItem('tasks')||'null')||DEFTASKS,
checkins:{},notes:{},
countdowns:{},alerted:{},sessionStartMin:null,
filter:'all',zoneFilter:'all',
exportTxt:'',handoffTxt:'',
showPin:false,pinTarget:null,pinTaskId:null,
showExport:false,
loading:false,editing:false,
syncStatus:'offline',
newTask:{time:'',zone:'三期',task:'',type:'關閉',shifts:[],instruction:''},
};

let unsub=null,audioCtx=null,clkIv=null,cdIv=null,toastTm=null;

// ─── Utils ────────────────────────────────────────────────────────────────────
// 晚班的 06:xx–11:xx 是隔天早上，需要 +1440 才不會誤判逾時
function toMin(t){const[h,m]=t.split(':').map(Number);if(S.shift==='late'&&h>=6&&h<12)return h*60+m+1440;return h<6?h*60+m+1440:h*60+m}
function nowMin(){const n=new Date(),h=n.getHours(),m=n.getMinutes();if(S.shift==='late'&&h>=6&&h<12)return h*60+m+1440;return h<6?h*60+m+1440:h*60+m}
function nowTs(){return new Date().toLocaleTimeString('zh-TW',{hour:'2-digit',minute:'2-digit',hour12:false})}
function todayStr(){
  const d=new Date();
  // 晚班凌晨（00:00-11:59）仍屬昨天的班次
  if(S.shift==='late'&&d.getHours()<12)d.setDate(d.getDate()-1);
  // 使用本地日期（非UTC），避免台灣UTC+8時差造成session分裂
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function canChk(t){return nowMin()>=toMin(t.time)-3}
function status(t){
  if(S.checkins[t.id])return'done';
  const d=toMin(t.time)-nowMin();
  if(nowMin()-toMin(t.time)>15)return'overdue';
  if(d<=15)return'due';
  return'upcoming';
}
function shiftTasks(){
  return S.tasks.filter(t=>S.shift&&t.shifts.includes(S.shift)).sort((a,b)=>toMin(a.time)-toMin(b.time));
}
function validOfficers(){return S.officers.filter(o=>o.trim())}

function toast(msg){
  document.querySelectorAll('.toast').forEach(e=>e.remove());
  if(toastTm)clearTimeout(toastTm);
  const d=document.createElement('div');d.className='toast';d.textContent=msg;
  document.body.appendChild(d);
  toastTm=setTimeout(()=>d.remove(),3000);
}

function playAlert(){
  try{
    if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();
    [0,.35,.7].forEach(d=>{
      const o=audioCtx.createOscillator(),g=audioCtx.createGain();
      o.connect(g);g.connect(audioCtx.destination);
      o.frequency.value=880;
      g.gain.setValueAtTime(.25,audioCtx.currentTime+d);
      g.gain.exponentialRampToValueAtTime(.001,audioCtx.currentTime+d+.4);
      o.start(audioCtx.currentTime+d);o.stop(audioCtx.currentTime+d+.4);
    });
  }catch(e){}
}

async function copyText(txt){
  try{await navigator.clipboard.writeText(txt);toast('✅ 已複製！貼到LINE群組吧')}
  catch(e){toast('請長按文字框手動複製')}
}

// ─── Firebase ops ──────────────────────────────────────────────────────────────
async function startSession(){
  S.loading=true;render();
  const sid=todayStr()+'_'+S.shift;
  S.sessionId=sid;
  const ref=db.collection('sessions').doc(sid);
  try{
    const doc=await ref.get();
    const newOff=validOfficers();
    if(!doc.exists){
      await ref.set({community:S.community,shift:S.shift,officers:newOff,checkins:{},notes:{},createdAt:firebase.firestore.FieldValue.serverTimestamp(),status:'active'});
    }else{
      const data=doc.data();
      const merged=[...new Set([...(data.officers||[]),...newOff])];
      await ref.update({officers:merged});
      S.checkins=data.checkins||{};
      S.notes=data.notes||{};
    }
    if(unsub)unsub();
    unsub=ref.onSnapshot(snap=>{
      if(snap.exists){
        const data=snap.data();
        S.checkins=data.checkins||{};
        S.notes=data.notes||{};
        S.syncStatus='online';
        if(!S.editing&&(S.screen==='patrol'||S.screen==='standby'))rerender();
      }
    },()=>{S.syncStatus='offline'});
    S.loading=false;S.screen='patrol';S.syncStatus='online';S.sessionStartMin=nowMin();
    localStorage.setItem('com',S.community);
    startTimers();render();
  }catch(e){
    S.loading=false;
    toast('❌ 連線失敗：'+e.message);
    render();
  }
}

async function doCheckIn(tid){
  const off=S.officers[S.curIdx]?.trim()||'人員';
  const ts=nowTs();
  S.syncStatus='syncing';
  try{
    await db.collection('sessions').doc(S.sessionId).update({[`checkins.${tid}`]:{officer:off,time:ts,ts:Date.now()}});
    S.syncStatus='online';
    S.countdowns[tid]=10;
  }catch(e){toast('❌ 同步失敗，請重試');S.syncStatus='offline'}
}

async function doRevoke(tid){
  try{
    await db.collection('sessions').doc(S.sessionId).update({[`checkins.${tid}`]:firebase.firestore.FieldValue.delete()});
    delete S.countdowns[tid];
    toast('✅ 主管已撤銷此打卡');
  }catch(e){toast('❌ 撤銷失敗')}
}

async function doNote(tid,note){
  try{
    S.notes[tid]=note;
    await db.collection('sessions').doc(S.sessionId).update({[`notes.${tid}`]:note});
  }catch(e){toast('❌ 備註儲存失敗')}
}

async function doReset(){
  try{
    await db.collection('sessions').doc(S.sessionId).update({checkins:{},notes:{},status:'reset',resetAt:firebase.firestore.FieldValue.serverTimestamp()});
    S.countdowns={};S.alerted={};
    toast('✅ 今日記錄已重置');
    S.screen='login';S.shift=null;S.sessionId=null;S.checkins={};S.notes={};S.sessionStartMin=null;
    stopTimers();if(unsub){unsub();unsub=null;}
    render();
  }catch(e){toast('❌ 重置失敗：'+e.message)}
}

// ─── Timers ───────────────────────────────────────────────────────────────────
function startTimers(){
  stopTimers();
  clkIv=setInterval(()=>{
    const el=document.getElementById('clk');
    if(el)el.textContent=new Date().toLocaleTimeString('zh-TW',{hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:false});
    if(S.screen==='patrol'){
      shiftTasks().forEach(t=>{
        if(!S.checkins[t.id]&&!S.alerted[t.id]&&nowMin()-toMin(t.time)>=15&&(S.sessionStartMin===null||toMin(t.time)>=S.sessionStartMin-2)){
          playAlert();S.alerted[t.id]=true;
          toast('⚠️ '+t.time+' ['+t.zone+'] 逾時未執行！');
        }
      });
    }
  },1000);
  cdIv=setInterval(()=>{
    let ch=false;
    Object.keys(S.countdowns).forEach(id=>{
      if(S.countdowns[id]>0){S.countdowns[id]--;ch=true;}
      else{delete S.countdowns[id];ch=true;}
    });
    if(ch){
      Object.keys(S.countdowns).forEach(id=>{
        const el=document.getElementById('cd-'+id);
        if(el)el.textContent=S.countdowns[id];
      });
      Object.keys(S.checkins).filter(id=>S.countdowns[id]===undefined).forEach(id=>{
        const circle=document.getElementById('c-'+id);
        if(circle&&S.checkins[id]){
          circle.style.background='var(--ok)';circle.style.borderColor='var(--ok)';
          circle.style.color='#fff';circle.style.cursor='default';circle.innerHTML='✓';
        }
        const graceTxt=document.getElementById('grace-'+id);
        if(graceTxt)graceTxt.remove();
        const doneTxt=document.getElementById('done-'+id);
        if(doneTxt){doneTxt.style.display='block';}
      });
    }
  },1000);
}
function stopTimers(){if(clkIv)clearInterval(clkIv);if(cdIv)clearInterval(cdIv);clkIv=null;cdIv=null;}

// ─── Export text ──────────────────────────────────────────────────────────────
function buildExport(interim){
  const st=shiftTasks(),done=st.filter(t=>S.checkins[t.id]).length;
  const d=new Date().toLocaleDateString('zh-TW'),ts=nowTs();
  const label=SL[S.shift],offs=validOfficers().join('、');
  const tag=interim?'📊 巡邏進度回報（未結束）':done===st.length?'📋 巡邏完成紀錄':'📋 巡邏紀錄';
  let txt=tag+'\n🏢 '+S.community+'　'+label+'\n📅 '+d+'　時間：'+ts+'\n值班：'+offs+'\n──────────────────\n';
  st.forEach(t=>{
    const ck=S.checkins[t.id],nt=S.notes[t.id]?'\n    📝 '+S.notes[t.id]:'';
    txt+=(ck?'✅':'🔲')+' '+t.time+' ['+t.zone+'] '+t.task+(ck?' （'+ck.time+' · '+ck.officer+'）':'')+nt+'\n';
  });
  txt+='──────────────────\n完成：'+done+'/'+st.length+'（'+Math.round(done/st.length*100||0)+'%）\n🏠 寶哥說物業管理小常識 @bensonhsu0205';
  return txt;
}
function buildHandoff(){
  const st=shiftTasks(),done=st.filter(t=>S.checkins[t.id]).length;
  const off=S.officers[S.curIdx]?.trim()||'人員',ts=nowTs();
  const d=new Date().toLocaleDateString('zh-TW');
  let txt='📤 巡邏交接（'+off+'）\n🏢 '+S.community+'　'+SL[S.shift]+'\n📅 '+d+'　交接時間：'+ts+'\n──────────────────\n';
  st.forEach(t=>{
    const ck=S.checkins[t.id],nt=S.notes[t.id]?'\n    📝 '+S.notes[t.id]:'';
    txt+=(ck?'✅':'🔲')+' '+t.time+' ['+t.zone+'] '+t.task+(ck?' （'+ck.time+' · '+ck.officer+'）':'')+nt+'\n';
  });
  txt+='──────────────────\n'+off+' 已完成 '+done+'/'+st.length+' 項，待後續人員繼續\n🏠 寶哥說物業管理小常識 @bensonhsu0205';
  return txt;
}

// ─── TopBar ───────────────────────────────────────────────────────────────────
function topbar(){
  const dot=S.sessionId?`<span class="sync-dot" style="background:${S.syncStatus==='online'?'var(--ok)':S.syncStatus==='syncing'?'var(--warn)':'var(--err)'}"></span><span style="font-size:12px;color:#fed7aa;">${S.syncStatus==='online'?'同步中':'離線'}</span>`:'';
  return`<div class="topbar"><div class="topbar-l">🏢 ${esc(S.community)||'社區巡邏系統'}</div><div class="topbar-r"><div style="font-size:13px;color:#fed7aa;font-weight:600;">寶哥說物業管理小常識</div><div style="font-size:12px;color:#fed7aa;opacity:.8;">@bensonhsu0205 ${dot}</div></div></div>`;
}

// ─── Render ───────────────────────────────────────────────────────────────────
function render(){
  if(S.editing)return;
  const app=document.getElementById('app');if(!app)return;
  if(S.loading){app.innerHTML='<div class="loading"><div class="spinner"></div><div>連線 Firebase 中…</div></div>';return;}
  if(S.screen==='login')app.innerHTML=rLogin();
  else if(S.screen==='patrol')app.innerHTML=rPatrol();
  else if(S.screen==='standby')app.innerHTML=rStandby();
  else if(S.screen==='admin')app.innerHTML=rAdmin();
  bind();
}
function rerender(){if(!S.editing){const app=document.getElementById('app');if(!app)return;if(S.screen==='patrol')app.innerHTML=rPatrol();else if(S.screen==='standby')app.innerHTML=rStandby();bind();}}

// ─── Login ────────────────────────────────────────────────────────────────────
function rLogin(){
  return`<div>${topbar()}
  <div class="content2">
    <div style="text-align:center;margin-bottom:26px;padding-top:8px;">
      <div style="font-size:13px;color:var(--pri);letter-spacing:4px;margin-bottom:8px;">🛡️ PATROL SYSTEM</div>
      <div style="font-size:28px;font-weight:800;">社區巡邏系統</div>
    </div>
    <div style="margin-bottom:16px;">
      <div style="font-size:15px;color:var(--dim);margin-bottom:8px;font-weight:600;">社區名稱</div>

function rTask(t){
  const st=status(t),ck=S.checkins[t.id],inGrace=S.countdowns[t.id]!==undefined;
  const early=!ck&&!canChk(t),zc=ZC[t.zone]||'#9ca3af';
  const stTxt=ck?(inGrace?S.countdowns[t.id]+'秒後鎖定':'已完成'):st==='overdue'?'⚠️逾時':st==='due'?'即將到':'待執行';
  const stCl=ck?(inGrace?'var(--warn)':'var(--ok)'):st==='overdue'?'var(--err)':st==='due'?'var(--warn)':'var(--dim)';
  const blink=(st==='due'||st==='overdue')&&!ck?' blink':'';
  const cirBg=ck?(inGrace?'rgba(251,191,36,.2)':'var(--ok)'):'transparent';
  const cirBdr=ck?(inGrace?'var(--warn)':'var(--ok)'):early?'var(--bdr)':st==='overdue'?'var(--err)':st==='due'?'var(--warn)':'var(--bdr)';
  const cirTxt=ck?(inGrace?`<span id="cd-${t.id}">${S.countdowns[t.id]}</span>`:'✓'):(early?'🔒':'');
  const cirCur=ck&&!inGrace?'default':early?'not-allowed':'pointer';
  const cirOp=early?.3:1;
  return`<div class="tc ${st}">
  <div style="padding:17px;">
    <div style="display:flex;align-items:flex-start;gap:13px;">
      <div id="c-${t.id}" class="chk" data-chk="${t.id}" style="background:${cirBg};border-color:${cirBdr};color:${ck?(inGrace?'var(--warn)':'#fff'):'inherit'};cursor:${cirCur};opacity:${cirOp};">${cirTxt}</div>
      <div style="flex:1;min-width:0;">
        <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:7px;">
          <span style="font-size:22px;font-weight:800;font-variant-numeric:tabular-nums;">${t.time}</span>
          <span class="zone-tag" style="background:${zc}22;color:${zc};border:1px solid ${zc}33;">${t.zone}</span>
          <span style="font-size:18px;">${TI[t.type]||''}</span>
        </div>
        <div style="font-size:18px;color:${ck?'#374151':'var(--txt)'};line-height:1.6;text-decoration:${ck&&!inGrace?'line-through':'none'};">${esc(t.task)}</div>
        ${early?`<div style="font-size:15px;color:var(--dim);margin-top:5px;">🔒 ${t.time} 前3分鐘才可執行</div>`:''}
        ${ck&&inGrace?`<div id="grace-${t.id}" style="font-size:15px;color:var(--warn);font-weight:700;margin-top:5px;">⚠️ 點圓圈可取消（<span id="cd-${t.id}">${S.countdowns[t.id]}</span>秒）</div>`:''}
        ${ck&&!inGrace?`<div id="done-${t.id}" style="font-size:15px;color:var(--ok);font-weight:700;margin-top:5px;">✓ ${ck.time} · ${esc(ck.officer)}</div>`:''}
        ${t.instruction?`<div style="font-size:14px;color:#fde68a;margin-top:6px;background:#1c1a05;padding:7px 11px;border-radius:6px;border-left:3px solid #fbbf24;">📍 ${esc(t.instruction)}</div>`:''}
        ${S.notes[t.id]?`<div style="font-size:15px;color:var(--acc);margin-top:7px;background:var(--bg);padding:6px 11px;border-radius:6px;border-left:3px solid var(--acc);">📝 ${esc(S.notes[t.id])}</div>`:''}
      </div>
      <div style="display:flex;flex-direction:column;align-items:flex-end;gap:7px;flex-shrink:0;">
        <div style="display:flex;align-items:center;gap:4px;">
          <div style="width:9px;height:9px;border-radius:50%;background:${stCl};" class="${blink}"></div>
          <span style="font-size:13px;color:${stCl};font-weight:700;">${stTxt}</span>
        </div>
        <div style="display:flex;gap:5px;">
          ${ck&&!inGrace?`<button class="rvk" data-tid="${t.id}" style="font-size:12px;padding:7px 11px;border-radius:8px;border:1px solid var(--bdr);background:transparent;color:var(--dim);">🔐</button>`:''}
          <button class="noteBtn" data-tid="${t.id}" style="font-size:14px;padding:7px 11px;border-radius:8px;border:1px solid var(--bdr);background:transparent;color:var(--dim);">備註✏️</button>
        </div>
      </div>
    </div>
  </div>
  <div id="ne-${t.id}" style="display:none;padding:10px 17px 17px;border-top:1px solid var(--bdr);">
    <textarea id="ni-${t.id}" style="width:100%;height:88px;background:var(--bg);border:1px solid var(--bdr);border-radius:10px;color:var(--txt);font-size:17px;padding:13px;resize:none;font-family:inherit;" placeholder="異常狀況、處理方式...">${esc(S.notes[t.id]||'')}</textarea>
    <div style="display:flex;gap:8px;margin-top:10px;">
      <button class="saveNote" data-tid="${t.id}" style="flex:1;padding:15px;border-radius:10px;background:var(--pri);border:none;color:#fff;font-size:17px;font-weight:700;">儲存備註</button>
      <button class="cancelNote" data-tid="${t.id}" style="padding:15px 19px;border-radius:10px;background:transparent;border:1px solid var(--bdr);color:var(--dim);font-size:17px;">取消</button>
    </div>
  </div>
  </div>`;
}

    </div>
    <div class="card">
      <div style="font-size:17px;font-weight:700;color:var(--pri);margin-bottom:14px;">➕ 新增巡邏任務</div>
      <div style="display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap;">
        <input class="input" id="nTime" value="${esc(ns.time)}" placeholder="HH:MM" style="width:100px;flex-shrink:0;">
        <select class="input" id="nZone" style="flex-shrink:0;">${Object.keys(ZC).map(z=>`<option${ns.zone===z?' selected':''}>${z}</option>`).join('')}</select>
        <select class="input" id="nType" style="flex-shrink:0;">${Object.keys(TI).map(t=>`<option${ns.type===t?' selected':''}>${t}</option>`).join('')}</select>
      </div>
      <input class="input" id="nDesc" value="${esc(ns.task)}" placeholder="任務說明..." style="margin-bottom:8px;">
      <textarea class="input" id="nInst" placeholder="📍 巡邏注意事項（選填，機動人員會看到）" style="height:72px;resize:none;margin-bottom:10px;">${esc(ns.instruction||'')} </textarea>
      <div style="font-size:15px;color:var(--dim);margin-bottom:8px;">適用班別：</div>
      <div style="display:flex;gap:10px;margin-bottom:14px;">
        <button class="nsBtn" data-ns="early" style="flex:1;padding:13px;border-radius:10px;border:2px solid ${ns.shifts.includes('early')?'#fb923c':'var(--bdr)'};background:${ns.shifts.includes('early')?'rgba(251,146,60,.15)':'transparent'};color:${ns.shifts.includes('early')?'#fb923c':'var(--dim)'};font-size:16px;font-weight:700;">☀️ 早班</button>
        <button class="nsBtn" data-ns="late" style="flex:1;padding:13px;border-radius:10px;border:2px solid ${ns.shifts.includes('late')?'#8b5cf6':'var(--bdr)'};background:${ns.shifts.includes('late')?'rgba(139,92,246,.15)':'transparent'};color:${ns.shifts.includes('late')?'#8b5cf6':'var(--dim)'};font-size:16px;font-weight:700;">🌙 晚班</button>
      </div>
      <button id="addTask" style="width:100%;padding:15px;border-radius:10px;background:var(--pri);border:none;color:#fff;font-size:17px;font-weight:700;">新增任務</button>
    </div>
    <div style="font-size:15px;color:var(--dim);margin-bottom:10px;font-weight:600;">所有任務（${S.tasks.length} 項）</div>
    ${[...S.tasks].sort((a,b)=>toMin(a.time)-toMin(b.time)).map(t=>`
      <div style="background:var(--sur);border:1px solid var(--bdr);border-radius:12px;padding:15px 17px;margin-bottom:8px;display:flex;align-items:flex-start;gap:12px;">
        <div style="flex:1;min-width:0;">
          <div style="display:flex;gap:7px;align-items:center;margin-bottom:5px;flex-wrap:wrap;">
            <span style="font-size:19px;font-weight:800;font-variant-numeric:tabular-nums;">${t.time}</span>
            <span class="zone-tag" style="background:${(ZC[t.zone]||'#9ca3af')}22;color:${ZC[t.zone]||'#9ca3af'};">${t.zone}</span>
            <span style="font-size:14px;color:var(--dim);">${t.shifts.map(s=>({early:'早',late:'晚'}[s])).join('/')}班</span>
          </div>
          <div style="font-size:16px;color:var(--dim);line-height:1.5;margin-bottom:6px;">${esc(t.task)}</div>
          <input class="instEdit" data-tid="${t.id}" value="${esc(t.instruction||'')}" placeholder="📍 注意事項（留空則不顯示）" style="width:100%;background:var(--bg);border:1px solid var(--bdr);border-radius:8px;color:#fde68a;padding:8px 10px;font-size:14px;font-family:inherit;">
        </div>
        <button class="delTask" data-tid="${t.id}" style="flex-shrink:0;background:#2d0a0a;border:1px solid #7f1d1d;border-radius:8px;color:var(--err);padding:10px 14px;font-size:15px;">刪除</button>
      </div>`).join('')}
  </div>
  ${S.showPin?rPin():''}
  </div>`;
}

// ─── Pin modal ────────────────────────────────────────────────────────────────
function rPin(){
  return`<div class="modal-center"><div class="modal-box">
  <div style="font-size:21px;font-weight:700;text-align:center;margin-bottom:18px;">🔐 主管驗證</div>
  <input type="password" id="pinIn" placeholder="輸入PIN碼" autocomplete="off" style="width:100%;padding:14px;background:var(--bg);border:1px solid var(--bdr);border-radius:10px;color:var(--txt);font-size:24px;letter-spacing:8px;text-align:center;margin-bottom:8px;font-family:inherit;">
  <div id="pinErr" style="color:var(--err);font-size:15px;text-align:center;margin-bottom:10px;display:none;">PIN碼錯誤</div>
  <div style="display:flex;gap:10px;">
    <button id="pinOK" style="flex:1;padding:17px;border-radius:12px;background:var(--pri);border:none;color:#fff;font-size:18px;font-weight:700;">確認</button>
    <button id="pinCancel" style="flex:1;padding:17px;border-radius:12px;background:transparent;border:1px solid var(--bdr);color:var(--dim);font-size:18px;">取消</button>
  </div>

  </div></div>`;
}

// ─── Export modal ─────────────────────────────────────────────────────────────
function rExport(){
  const allDone=shiftTasks().every(t=>S.checkins[t.id]);
  return`<div class="modal-bg"><div class="modal-sheet">
  <div style="font-size:20px;font-weight:700;margin-bottom:6px;">${allDone?'✅ 全部完成！':'📤 回報目前進度'}</div>
  <div style="font-size:15px;color:var(--dim);margin-bottom:12px;">複製後貼到LINE群組</div>
  <textarea readonly style="width:100%;height:220px;background:var(--bg);border:1px solid var(--bdr);border-radius:10px;color:var(--txt);font-size:13px;padding:13px;font-family:monospace;resize:none;">${esc(S.exportTxt)}</textarea>
  <div style="display:flex;gap:10px;margin-top:12px;">
    <button id="cpExp" style="flex:1;padding:17px;border-radius:12px;background:${allDone?'var(--ok)':'var(--pri)'};border:none;color:#fff;font-size:18px;font-weight:700;">複製到剪貼板</button>
    <button id="clsExp" style="padding:17px 20px;border-radius:12px;background:transparent;border:1px solid var(--bdr);color:var(--dim);font-size:18px;">關閉</button>
  </div>
  </div></div>`;
}

// ─── PIN handler ──────────────────────────────────────────────────────────────
function handlePin(){
  const v=document.getElementById('pinIn')?.value||'';
  if(v===PIN){
    S.showPin=false;
    if(S.pinTarget==='admin'){S.screen='admin';render();}
    else if(S.pinTarget==='revoke'&&S.pinTaskId){doRevoke(S.pinTaskId);S.pinTarget=null;S.pinTaskId=null;rerender();}
    else if(S.pinTarget==='reset'){doReset();}
    S.pinTarget=null;
  }else{
    const e=document.getElementById('pinErr');if(e)e.style.display='block';
    const i=document.getElementById('pinIn');if(i)i.value='';
  }
}

// ─── Bind events ──────────────────────────────────────────────────────────────
function bind(){
  document.querySelectorAll('input,textarea').forEach(el=>{
    if(el.id!=='pinIn'){el.addEventListener('focus',()=>S.editing=true);el.addEventListener('blur',()=>S.editing=false);}
  });

  // Login
  const iCom=document.getElementById('iCom');
  if(iCom)iCom.addEventListener('input',e=>S.community=e.target.value);
  const addOff=document.getElementById('addOff');
  if(addOff)addOff.addEventListener('click',()=>{S.officers.push('');render();});
  document.querySelectorAll('.off-inp').forEach(i=>{i.addEventListener('input',e=>{S.officers[+e.target.dataset.i]=e.target.value;});});
  document.querySelectorAll('.rm-off').forEach(b=>{b.addEventListener('click',e=>{const i=+e.currentTarget.dataset.i;S.officers.splice(i,1);if(S.curIdx>=S.officers.length)S.curIdx=0;render();});});
  document.querySelectorAll('.shift-btn').forEach(b=>{b.addEventListener('click',e=>{S.shift=e.currentTarget.dataset.sh;render();});});
  const startBtn=document.getElementById('startBtn');
  if(startBtn)startBtn.addEventListener('click',()=>{
    if(!S.shift){toast('請選擇班別');return;}
    if(!S.officers.some(o=>o.trim())){toast('請填寫至少一位人員姓名');return;}
    startSession();
  });
  const adminBtn=document.getElementById('adminBtn');
  if(adminBtn)adminBtn.addEventListener('click',()=>{S.pinTarget='admin';S.showPin=true;render();});

  // Patrol
  document.querySelectorAll('[data-chk]').forEach(el=>{
    el.addEventListener('click',async e=>{
      const tid=e.currentTarget.dataset.chk;
      const t=S.tasks.find(x=>x.id===tid);if(!t)return;
      if(S.checkins[tid]){
        if(S.countdowns[tid]!==undefined)await doRevoke(tid);
        else toast('🔒 已永久鎖定，主管驗證才能撤銷');
        return;
      }
      if(!canChk(t)){toast('🔒 請於 '+t.time+' 前3分鐘後才能打卡');return;}
      await doCheckIn(tid);
    });
  });
  document.querySelectorAll('.off-pill').forEach(b=>{b.addEventListener('click',e=>{
    S.curIdx=+e.currentTarget.dataset.oi;
    document.querySelectorAll('.off-pill').forEach(p=>p.classList.toggle('on',+p.dataset.oi===S.curIdx));
  });});
  document.querySelectorAll('.ftab').forEach(b=>{b.addEventListener('click',e=>{S.filter=e.currentTarget.dataset.f;rerender();});});
  document.querySelectorAll('.ztab').forEach(b=>{b.addEventListener('click',e=>{S.zoneFilter=e.currentTarget.dataset.z;rerender();});});
  document.querySelectorAll('.noteBtn').forEach(b=>{b.addEventListener('click',e=>{
    const id=e.currentTarget.dataset.tid,ne=document.getElementById('ne-'+id);
    if(ne){const show=ne.style.display==='none';ne.style.display=show?'block':'none';if(show){const ta=document.getElementById('ni-'+id);if(ta){ta.focus();S.editing=true;}}}
  });});
  document.querySelectorAll('.saveNote').forEach(b=>{b.addEventListener('click',async e=>{
    const id=e.currentTarget.dataset.tid,ta=document.getElementById('ni-'+id);
    if(ta){S.editing=false;await doNote(id,ta.value);document.getElementById('ne-'+id).style.display='none';toast('✅ 備註已儲存');}
  });});
  document.querySelectorAll('.cancelNote').forEach(b=>{b.addEventListener('click',e=>{document.getElementById('ne-'+e.currentTarget.dataset.tid).style.display='none';S.editing=false;});});
  document.querySelectorAll('.rvk').forEach(b=>{b.addEventListener('click',e=>{S.pinTarget='revoke';S.pinTaskId=e.currentTarget.dataset.tid;S.showPin=true;rerender();});});
  const hOff=document.getElementById('handoff');
  if(hOff)hOff.addEventListener('click',()=>{S.handoffTxt=buildHandoff();S.screen='standby';render();});
  const expBtn=document.getElementById('expBtn');
  if(expBtn)expBtn.addEventListener('click',()=>{S.exportTxt=buildExport(false);S.showExport=true;rerender();});
  const midRpt=document.getElementById('midRpt');
  if(midRpt)midRpt.addEventListener('click',()=>{S.exportTxt=buildExport(true);S.showExport=true;rerender();});
  const pAdmin=document.getElementById('pAdmin');
  if(pAdmin)pAdmin.addEventListener('click',()=>{S.pinTarget='admin';S.showPin=true;rerender();});

  // Standby
  const copyH=document.getElementById('copyH');
  if(copyH)copyH.addEventListener('click',()=>copyText(S.handoffTxt));
  const resume=document.getElementById('resume');
  if(resume)resume.addEventListener('click',()=>{S.screen='patrol';render();});
  const endShift=document.getElementById('endShift');
  if(endShift)endShift.addEventListener('click',()=>{
    if(confirm('確定結案？將返回登入畫面，打卡記錄仍保留在 Firebase。')){
      stopTimers();if(unsub){unsub();unsub=null;}
      S.screen='login';S.shift=null;S.sessionId=null;S.checkins={};S.notes={};S.countdowns={};S.alerted={};S.sessionStartMin=null;
      render();
    }
  });

  // Admin
  const adminBack=document.getElementById('adminBack');
  if(adminBack)adminBack.addEventListener('click',()=>{S.screen=S.sessionId?'patrol':'login';render();});
  const saveCom=document.getElementById('saveCom');
  if(saveCom)saveCom.addEventListener('click',()=>{
    const v=document.getElementById('aCom')?.value||'';
    S.community=v;localStorage.setItem('com',v);toast('✅ 社區名稱已儲存');
  });
  const savePin=document.getElementById('savePin');
  if(savePin)savePin.addEventListener('click',()=>{
    const p1=document.getElementById('newPin1')?.value||'';
    const p2=document.getElementById('newPin2')?.value||'';
    if(!p1){toast('請輸入新PIN碼');return;}
    if(p1.length<4){toast('PIN碼至少需要4位');return;}
    if(p1!==p2){toast('❌ 兩次輸入不一致，請重新輸入');
      document.getElementById('newPin1').value='';
      document.getElementById('newPin2').value='';
      return;}
    PIN=p1;localStorage.setItem('adminPin',p1);
    document.getElementById('newPin1').value='';
    document.getElementById('newPin2').value='';
    toast('✅ PIN碼已更新，請記妥新碼');
    rerender();
  });
  const doRst=document.getElementById('doReset');
  if(doRst)doRst.addEventListener('click',()=>{
    if(!S.sessionId){toast('目前沒有進行中的班次');return;}
    if(confirm('確定重置？Firebase 上的資料也會清除'))doReset();
  });
  document.querySelectorAll('.nsBtn').forEach(b=>{b.addEventListener('click',e=>{
    const ns=e.currentTarget.dataset.ns;
    if(!S.newTask)S.newTask={time:'',zone:'三期',task:'',type:'關閉',shifts:[],instruction:''};
    if(S.newTask.shifts.includes(ns))S.newTask.shifts=S.newTask.shifts.filter(s=>s!==ns);
    else S.newTask.shifts.push(ns);
    rerender();
  });});
  const addTask=document.getElementById('addTask');
  if(addTask)addTask.addEventListener('click',()=>{
    const time=document.getElementById('nTime')?.value||'';
    const zone=document.getElementById('nZone')?.value||'三期';
    const type=document.getElementById('nType')?.value||'關閉';
    const task=document.getElementById('nDesc')?.value||'';
    const shifts=S.newTask?.shifts||[];
    const instruction=document.getElementById('nInst')?.value.trim()||'';
    if(!time||!task||!shifts.length){toast('請填寫時間、說明並選擇班別');return;}
    S.tasks.push({id:String(Date.now()),time,zone,task,type,shifts,instruction});
    localStorage.setItem('tasks',JSON.stringify(S.tasks));
    S.newTask={time:'',zone:'三期',task:'',type:'關閉',shifts:[],instruction:''};
    toast('✅ 任務已新增');rerender();
  });
  document.querySelectorAll('.instEdit').forEach(inp=>{
    inp.addEventListener('focus',()=>S.editing=true);
    inp.addEventListener('blur',e=>{
      S.editing=false;
      const tid=e.target.dataset.tid;
      const val=e.target.value.trim();
      const task=S.tasks.find(t=>t.id===tid);
      if(task){task.instruction=val;localStorage.setItem('tasks',JSON.stringify(S.tasks));toast('✅ 注意事項已儲存');}
    });
  });
  document.querySelectorAll('.delTask').forEach(b=>{b.addEventListener('click',e=>{
    if(confirm('確定刪除此任務？')){
      S.tasks=S.tasks.filter(t=>t.id!==e.currentTarget.dataset.tid);
      localStorage.setItem('tasks',JSON.stringify(S.tasks));rerender();
    }
  });});

  // PIN
  const pinIn=document.getElementById('pinIn');
  if(pinIn){pinIn.focus();pinIn.addEventListener('keydown',e=>{if(e.key==='Enter')handlePin();});}
  const pinOK=document.getElementById('pinOK');
  if(pinOK)pinOK.addEventListener('click',handlePin);
  const pinCancel=document.getElementById('pinCancel');
  if(pinCancel)pinCancel.addEventListener('click',()=>{S.showPin=false;S.pinTarget=null;S.pinTaskId=null;if(S.screen==='patrol'||S.screen==='admin')rerender();else render();});

  // Export
  const cpExp=document.getElementById('cpExp');
  if(cpExp)cpExp.addEventListener('click',async()=>{await copyText(S.exportTxt);S.showExport=false;rerender();});
  const clsExp=document.getElementById('clsExp');
  if(clsExp)clsExp.addEventListener('click',()=>{S.showExport=false;rerender();});
}

// ─── Start ─────────────────────────────────────────────────────────────────────
render();
</script>
</body>
</html>
